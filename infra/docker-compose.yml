# docker-compose.yml — universal baseline
# Works on: local dev, VPS (OVH/Hetzner), self-hosted, ngrok
# For GCP/AWS, use the platform-specific configs in infra/gcp/ or infra/aws/



services:

  ergo:
    build:
      context: ../packages/irc
    ports:
      - "6667:6667"
      - "6697:6697"
      - "8097:8097"
    volumes:
      # Bind-mount (not a named volume) so fail2ban can read ergo.log on the host.
      - ./ergo-data:/var/lib/ergo
      - ${TLS_DIR:-./tls}:/etc/ergo/tls:ro
      # Box-local config (real oper hashes from `ergo genpasswd`) mounted OVER the
      # baked template. Default re-mounts the committed template, whose opers have
      # empty passwords and WON'T boot — point ERGO_CONF at infra/ergo.local.yaml
      # (git-ignored) on a real deploy. Same "provide it on the box" pattern as
      # the TLS certs above. See docs/deploy/vps.md.
      - ${ERGO_CONF:-../packages/irc/ergo.yaml}:/etc/ergo.yaml:ro
    restart: unless-stopped
    networks:
      korin:
        # Alias ergo under its public cert hostname so first-party services
        # (irc-bridge) can connect over TLS :6697 internally with hostname
        # verification intact. The plaintext :6667 is NOT an internal option —
        # it's sts-only and disconnects every client after a fake 001 burst.
        aliases:
          - ${IRC_DOMAIN:-irc.korin.pink}

  api:
    build:
      context: ../packages/api
    ports:
      - "3000:3000"
    env_file: ../.env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
    restart: unless-stopped
    networks: [korin]
    depends_on: [ergo]

  irc-bridge:
    build:
      context: ../packages/irc-bridge
    env_file: ../.env
    environment:
      # Dial ergo by its cert hostname (network alias above), never `ergo` —
      # Node TLS rejects the mismatched cert. IRC_TLS defaults to true.
      - IRC_HOST=${IRC_DOMAIN:-irc.korin.pink}
      - IRC_PORT=6697
      - KORIN_API_URL=http://api:3000
    restart: unless-stopped
    networks: [korin]
    depends_on: [ergo, api]

  # Hot-path accounting authority (Go) — ADR-004. No Caddy route yet; published
  # directly on :3001 so a local stellar-api can reach it via KORIN_LEDGER_URL
  # (stellar's api metrics/announce and ledger are separate services, not one
  # shared address). Reachable on the korin network at ledger:3001.
  ledger:
    build:
      context: ../packages/ledger
    ports:
      - "3001:3001"
    env_file: ../.env
    environment:
      - LEDGER_PORT=3001
    restart: unless-stopped
    networks: [korin]
    depends_on: [api]

  # The wiki is no longer a separate container: it's part of the unified Astro
  # build (packages/web/dist/wiki/**), served by Caddy's catch-all below. Build
  # the site on the box before `docker compose up`:
  #   pnpm install && packages/chat/build.sh && pnpm --filter @korin/web build
  # (see docs/deploy/vps.md).

  caddy:
    image: caddy:2-alpine
    ports:
      - "8082:80"
      - "8443:443"
      - "8443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # The built Astro site (landing + /wiki + /chat). Build it on the box first
      # (see docs/deploy/vps.md); an unbuilt dist/ means Caddy serves 404s.
      - ../packages/web/dist:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    restart: unless-stopped
    networks: [korin]
    depends_on:
      api:
        condition: service_started

volumes:
  caddy_data:
  caddy_config:

networks:
  korin:
    driver: bridge
