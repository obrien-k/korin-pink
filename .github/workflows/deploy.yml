name: deploy

# Deploys the api / irc-bridge / ergo stack. MANUAL-DISPATCH ONLY: a prod deploy
# never fires automatically — trigger it from the Actions tab and pick a target.
# Dormant until then (no push trigger), so it can't ship a bad merge to the box.
#
# The deploy-vps job renders the box .env from Actions secrets (see
# docs/deploy/secrets.md) — the box .env is deploy-managed, never hand-edited.
#
# Required secrets/vars per target are referenced inline below; the VPS target
# needs: VPS_HOST, VPS_SSH_KEY, STELLAR_PULL_KEY, STELLAR_SERVICE_KEY,
# IRC_BRIDGE_SECRET, IRC_SASL_USER, IRC_SASL_PASS (secrets) + STELLAR_API_URL,
# API_DOMAIN (vars).

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        type: choice
        options: [vps, gcp, aws]

jobs:

  # ── Build images (platform-agnostic) ───────────────────────────────────────
  # Target comes from the workflow_dispatch `target` input (vps | gcp | aws).
  # Images go to: GHCR (vps) | GCP Artifact Registry | AWS ECR.

  build:
    name: build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write   # for GHCR

    outputs:
      registry: ${{ steps.registry.outputs.reg }}

    steps:
      - uses: actions/checkout@v4

      - name: resolve target
        id: target
        run: echo "val=${{ github.event.inputs.target }}" >> $GITHUB_OUTPUT

      # GCP
      - if: steps.target.outputs.val == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - if: steps.target.outputs.val == 'gcp'
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      # AWS
      - if: steps.target.outputs.val == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT }}:role/github-actions-korin
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - if: steps.target.outputs.val == 'aws'
        run: |
          aws ecr get-login-password --region ${{ vars.AWS_REGION || 'us-east-1' }} \
            | docker login --username AWS \
              --password-stdin ${{ secrets.AWS_ACCOUNT }}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-1' }}.amazonaws.com

      # VPS → GHCR
      - if: steps.target.outputs.val == 'vps'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: set registry
        id: registry
        run: |
          TARGET=${{ steps.target.outputs.val }}
          case "$TARGET" in
            gcp) REG="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/korin" ;;
            aws) REG="${{ secrets.AWS_ACCOUNT }}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-1' }}.amazonaws.com/korin" ;;
            vps) REG="ghcr.io/${{ github.repository_owner }}/korin" ;;
          esac
          echo "reg=$REG" >> $GITHUB_OUTPUT

      - name: build + push api
        run: |
          R=${{ steps.registry.outputs.reg }}
          docker build -t $R/api:${{ github.sha }} -t $R/api:latest ./packages/api
          docker push $R/api --all-tags

      - name: build + push irc-bridge
        run: |
          R=${{ steps.registry.outputs.reg }}
          docker build -t $R/irc-bridge:${{ github.sha }} -t $R/irc-bridge:latest ./packages/irc-bridge
          docker push $R/irc-bridge --all-tags

      - name: build + push ergo
        run: |
          R=${{ steps.registry.outputs.reg }}
          docker build -t $R/ergo:${{ github.sha }} -t $R/ergo:latest ./packages/irc
          docker push $R/ergo --all-tags

  # ── Deploy: GCP ────────────────────────────────────────────────────────────
  deploy-gcp:
    needs: build
    if: github.event.inputs.target == 'gcp'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: korin-api
          region: us-central1
          image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/korin/api:${{ github.sha }}
      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: korin-irc-bridge
          region: us-central1
          image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/korin/irc-bridge:${{ github.sha }}
      # Build the unified static site (landing + Starlight wiki + gamja chat) so
      # the bucket gets the compiled dist/, not Astro source.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: packages/chat/build.sh
      - run: pnpm --filter @korin/web build
      - uses: google-github-actions/setup-gcloud@v2
      - run: gsutil -m rsync -r -d ./packages/web/dist gs://korin-pink-web

  # ── Deploy: AWS ────────────────────────────────────────────────────────────
  deploy-aws:
    needs: build
    if: github.event.inputs.target == 'aws'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT }}:role/github-actions-korin
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - run: aws ecs update-service --cluster korin --service korin-api --force-new-deployment
      - run: aws ecs update-service --cluster korin --service korin-irc-bridge --force-new-deployment
      # Build the unified static site (landing + Starlight wiki + gamja chat) so
      # S3 gets the compiled dist/, not Astro source.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: packages/chat/build.sh
      - run: pnpm --filter @korin/web build
      - run: aws s3 sync ./packages/web/dist s3://korin-pink-web --delete

  # ── Deploy: VPS ────────────────────────────────────────────────────────────
  deploy-vps:
    needs: build
    if: github.event.inputs.target == 'vps'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/ssh-action@v1
        env:
          # Shared secrets — each minted by the side that GUARDS the call (the
          # other repo holds a copy as an Actions secret). See docs/deploy/secrets.md.
          STELLAR_PULL_KEY:    ${{ secrets.STELLAR_PULL_KEY }}     # S1: korin guards  -> korin mints
          STELLAR_SERVICE_KEY: ${{ secrets.STELLAR_SERVICE_KEY }}  # S2: stellar guards -> stellar mints
          # korin-internal secrets.
          IRC_BRIDGE_SECRET:   ${{ secrets.IRC_BRIDGE_SECRET }}
          IRC_SASL_USER:       ${{ secrets.IRC_SASL_USER }}
          IRC_SASL_PASS:       ${{ secrets.IRC_SASL_PASS }}
          # Non-secret config (repo variables, with defaults).
          STELLAR_API_URL:     ${{ vars.STELLAR_API_URL }}
          API_DOMAIN:          ${{ vars.API_DOMAIN || 'api.korin.pink' }}
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          # Forward the env above into the remote shell (kept out of the logged script).
          envs: STELLAR_PULL_KEY,STELLAR_SERVICE_KEY,IRC_BRIDGE_SECRET,IRC_SASL_USER,IRC_SASL_PASS,STELLAR_API_URL,API_DOMAIN
          script: |
            set -euo pipefail
            cd /opt/korin.pink
            git pull origin main
            # Render the box .env from the injected secrets — deploy-managed, never
            # hand-edited. Note STELLAR_API_KEY (korin's outbound Bearer) is fed by
            # stellar's STELLAR_SERVICE_KEY: same secret, named per side. IRC wiring
            # (IRC_HOST/IRC_PORT/KORIN_API_URL) is deliberately NOT rendered: the
            # compose service env owns it (see #58 — a stale IRC_HOST=ergo here is
            # exactly the drift that caused the register→drop incident).
            #
            # This TRUNCATES .env. Keys CI does not render (GEMINI_API_KEY, DRIVE_*,
            # GOOGLE_APPLICATION_CREDENTIALS) belong in the box-owned .env.local,
            # which compose loads alongside this file and CI never touches.
            umask 077
            cat > /opt/korin.pink/.env <<EOF
            DOMAIN=korin.pink
            STELLAR_API_URL=${STELLAR_API_URL}
            STELLAR_PULL_KEY=${STELLAR_PULL_KEY}
            STELLAR_API_KEY=${STELLAR_SERVICE_KEY}
            IRC_BRIDGE_SECRET=${IRC_BRIDGE_SECRET}
            IRC_SASL_USER=${IRC_SASL_USER}
            IRC_SASL_PASS=${IRC_SASL_PASS}
            FLUSH_INTERVAL_MS=60000
            EOF
            # Gates, prod-overlay bring-up, bridge recreate and SASL verification
            # all live in infra/deploy.sh — the SAME script a human runs on the box.
            # Keeping one copy is the point: the inlined version used to drift from
            # what anyone actually typed by hand, and a bring-up missing ERGO_CONF or
            # the prod overlay produces a silently different stack.
            API_DOMAIN="${API_DOMAIN}" IRC_SASL_USER="${IRC_SASL_USER}" ./infra/deploy.sh
