# ergo.yaml — korin.pink IRC daemon config
# Ergo IRCd: https://ergo.chat
# Docs: https://github.com/ergochat/ergo/blob/stable/docs/MANUAL.md

network:
  name: korin

server:
  name: korin.pink
  listeners:
    # Plain IRC (redirect clients to TLS)
    ":6667":
      sts-only: true
    # TLS IRC
    ":6697":
      tls:
        cert: /etc/ergo/tls/fullchain.pem
        key:  /etc/ergo/tls/privkey.pem
    # IRC over WebSocket (TLS) — for web clients
    ":8097":
      websocket: true
      tls:
        cert: /etc/ergo/tls/fullchain.pem
        key:  /etc/ergo/tls/privkey.pem

  # STS (Strict Transport Security) — force TLS
  sts:
    enabled: true
    duration: 1mo2d5h
    port: 6697
    preload: false

  motd: /etc/ergo/motd.txt

  # Casemapping: use "ascii" for simplicity, "precis" for unicode
  casemapping: "ascii"

  # Required by the WebSocket listener (:8097) — Ergo refuses to start a
  # websocket listener without it. Pre-emptively discards non-UTF8 messages.
  enforce-utf8: true

  # Max connections
  max-sendq: 96k
  ip-limits:
    count: true
    # Kept in step with the DOCKER-USER connlimit (packages/harden firewall).
    max-concurrent-connections: 8
    max-connections-per-duration: 30 per 10m

  ip-cloaking:
    enabled: true
    netname: korin
    cidr-len-ipv4: 32
    cidr-len-ipv6: 64
    num-bits: 64

accounts:
  # Require account registration to connect
  registration:
    enabled: true
    # Allow registration via email (korin.pink custom domain)
    email-verification:
      enabled: false  # TODO(#5): enable with korin.pink SMTP
    allow-before-connect: true
    throttling:
      enabled: true
      duration: 10m
      max-attempts: 30

  # Open lurking: anyone may connect anonymously; registration is only needed to
  # hold a nick / earn IRCScore. Matches the wiki's "no account required to lurk".
  # (v0.x uses Ergo-NATIVE accounts in Buntdb — Ergo cannot delegate SASL to
  # stellar-api; nick→Stellar mapping is self-reported via the korin API.)
  require-sasl:
    enabled: false

  authentication-enabled: true

  # Required by nick-reservation.force-nick-equals-account below — Ergo refuses
  # to start with force-nick-equals-account unless multiclient is enabled.
  # Also gives users optional bouncer-style multi-session attach.
  multiclient:
    enabled: true
    allowed-by-default: true
    always-on: "opt-in"
    auto-away: "opt-in"

  nick-reservation:
    enabled: true
    additional-nick-limit: 2
    method: strict
    allow-custom-enforcement: true
    guest-nickname-format: "Guest-*"
    force-nick-equals-account: true

channels:
  registration:
    enabled: true
    # Only opers may register channels. Ergo has no static "reserved channels"
    # config — the core channels (#announce/#stellar/#korin) are registered at
    # deploy by the SysOp via ChanServ (see docs/deploy/vps.md). operator-only
    # keeps the names from being squatted before/after that.
    operator-only: true
  default-modes: +nt

history:
  enabled: true
  channel-length: 2048
  # Max messages a client can pull per CHATHISTORY request (0 disables it).
  # Ergo warns at boot if unset.
  chathistory-maxmessages: 1000
  retention:
    allow-individual-user-override: true
    default:
      duration: 7d
  persistent:
    # Backed by SQLite (datastore.sqlite) so channel scrollback survives
    # restarts. Persistence overrides the in-memory size limits above.
    enabled: true
    unregistered-channels: false
    registered-channels: opt-out
    direct-messages: opt-out
  restrictions:
    # Messages older than this are unretrievable and eventually purged
    # (matches retention.default.duration). NOTE: this is `expire-time`, a
    # duration — not `query-cutoff`, which is an enum (see below).
    expire-time: 1w
    # How far back history is readable: 'none' (open, fits open-lurking),
    # 'registration-time', or 'join-time'.
    query-cutoff: none

datastore:
  path: /var/lib/ergo/ircd.db
  # Buntdb embedded — fine for small-medium communities
  # Migrate to Postgres for scale: https://ergo.chat/postgres

  # Persistent history backend (required when history.persistent is enabled).
  # Lives next to ircd.db inside the bind-mounted /var/lib/ergo, so scrollback
  # survives container restarts on the 1 GB box without a separate DB server.
  sqlite:
    enabled: true
    database-path: /var/lib/ergo/ergo_history.db
    busy-timeout: 5s
    max-conns: 1

# Operator accounts (configure post-deploy)
opers:
  # Human SysOp: governs the network and registers the core community channels.
  # Because channels.registration.operator-only is set, channel registration
  # (and thus #announce/#stellar/#korin) is gated behind an oper login.
  korin-admin:
    class: "sysop"
    # password hash: ergo genpasswd  (this is the /OPER credential; the matching
    # NickServ account is registered post-deploy — see docs/deploy/vps.md)
    password: ""  # TODO: set via ergo genpasswd
  stellar-bridge:
    # The irc-bridge bot's operator credentials
    class: "bot"
    hidden: true
    # password hash: ergo genpasswd
    password: ""  # TODO: set via ergo genpasswd

# Capability tokens below are Ergo's exact names (ergo defaultconfig). Ergo
# SILENTLY IGNORES unrecognised capabilities, so a typo is a no-op, not an
# error — packages/irc/test/oper-policy.test.ts guards against that.
oper-classes:
  "bot":
    title: Bridge Bot
    capabilities:
      - "kill"
      - "ban"
      - "snomasks"
      - "roleplay"
      - "relaymsg"
  "sysop":
    title: Korin SysOp
    capabilities:
      - "kill"        # disconnect sessions
      - "ban"         # K/D-line, suspend accounts
      - "nofakelag"   # exempt from fakelag
      - "vhosts"      # manage vhosts
      - "sajoin"      # join any channel
      - "samode"      # set any mode
      - "snomasks"    # subscribe to server-notice masks
      - "rehash"      # reload config at runtime
      - "chanreg"     # manage channel registrations (govern #announce et al.)
      - "accreg"      # manage account registrations
      - "history"     # manage/delete history

limits:
  nicklen: 32
  identlen: 20
  channellen: 64
  awaylen: 390
  kicklen: 390
  topiclen: 390
  monitor-entries: 100
  multiline:
    max-bytes: 4096
    max-lines: 100
  whowas-entries: 100
  chan-list-modes: 60
  registration-messages: 1024

fakelag:
  enabled: true
  window: 1s
  burst-limit: 5
  messages-per-second: 2
  cooldown: 2s

roleplay:
  enabled: false

logging:
  - method: stderr
    type: "*"
    level: info
  # File sink so fail2ban's [ergo] jail has a logpath (see infra/fail2ban/ergo.conf).
  - method: file
    filename: /var/lib/ergo/ergo.log
    type: "* -userinput -useroutput"
    level: info
