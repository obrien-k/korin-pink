# ergo.smoke.yaml — purpose-built Ergo config for the on-demand end-to-end smoke
# (packages/irc-bridge/smoke). NOT the production config: the real packages/irc/ergo.yaml
# is TLS-only (sts-only:true on 6667, STS, TLS listeners needing certs) and is covered
# by its own boot test (packages/irc/test/ergo-config.test.ts). This trimmed config
# keeps only what the bridge smoke needs and runs from a clean checkout:
#   - plaintext :6667 (no TLS certs to provision)
#   - native account registration, allow-before-connect, email verification off
#   - force-nick-equals-account (the property the !verify proof rests on)
#   - no opers (so no bcrypt hashes are needed for a clean boot)
# All values here are test placeholders — nothing secret.

network:
  name: korin-smoke

server:
  name: smoke.korin.test
  listeners:
    ":6667": {}
  casemapping: ascii
  enforce-utf8: true
  relaymsg:
    enabled: false
  max-sendq: 96k
  ip-limits:
    count: false
    max-concurrent-connections: 0
    max-connections-per-duration: 0
  ip-cloaking:
    enabled: false

datastore:
  autocreate: true
  path: /var/lib/ergo/ircd.db

accounts:
  authentication-enabled: true
  registration:
    enabled: true
    allow-before-connect: true
    email-verification:
      enabled: false
    throttling:
      enabled: false
  login-throttling:
    enabled: false
  require-sasl:
    enabled: false
  multiclient:
    enabled: true
    allowed-by-default: true
    always-on: "opt-in"
    auto-away: "opt-in"
  nick-reservation:
    enabled: true
    additional-nick-limit: 2
    method: strict
    allow-custom-enforcement: true
    guest-nickname-format: "Guest-*"
    force-nick-equals-account: true

channels:
  registration:
    enabled: true
    operator-only: false
  default-modes: +nt

history:
  enabled: true
  channel-length: 128
  chathistory-maxmessages: 100

limits:
  nicklen: 32
  identlen: 20
  channellen: 64
  awaylen: 200
  kicklen: 390
  topiclen: 390
  monitor-entries: 100
  whowas-entries: 100
  chan-list-modes: 60
  registration-messages: 1024

logging:
  - method: stderr
    type: "* -userinput -useroutput"
    level: info
