# docker-compose.yml — universal baseline
# Works on: local dev, VPS (OVH/Hetzner), self-hosted, ngrok
# For GCP/AWS, use the platform-specific configs in infra/gcp/ or infra/aws/



services:

  ergo:
    build:
      context: ../packages/irc
    ports:
      - "6667:6667"
      - "6697:6697"
      - "8097:8097"
    volumes:
      # Bind-mount (not a named volume) so fail2ban can read ergo.log on the host.
      - ./ergo-data:/var/lib/ergo
      - ${TLS_DIR:-./tls}:/etc/ergo/tls:ro
    restart: unless-stopped
    networks: [korin]

  api:
    build:
      context: ../packages/api
    ports:
      - "3000:3000"
    env_file: ../.env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
    restart: unless-stopped
    networks: [korin]
    depends_on: [ergo]

  irc-bridge:
    build:
      context: ../packages/irc-bridge
    env_file: ../.env
    environment:
      - IRC_HOST=ergo
      - IRC_PORT=6697
      - KORIN_API_URL=http://api:3000
    restart: unless-stopped
    networks: [korin]
    depends_on: [ergo, api]

  # Hot-path accounting authority (Go) — ADR-004. Internal-only for now
  # (no published ports, no Caddy route); reachable on the korin network at
  # ledger:3001. Flushes summaries to stellar-api (system of record).
  ledger:
    build:
      context: ../packages/ledger
    env_file: ../.env
    environment:
      - LEDGER_PORT=3001
    restart: unless-stopped
    networks: [korin]
    depends_on: [api]

  wiki:
    build:
      context: ../wiki
    restart: unless-stopped
    networks: [korin]
    # Opt-in only. The Docusaurus build is memory-hungry and OOMs on a 1 GB VPS,
    # and the wiki is already served from Cloudflare Pages (/wiki) in production.
    # Default `docker compose up` skips it; bring it in with `--profile wiki`.
    profiles: [wiki]

  caddy:
    image: caddy:2-alpine
    ports:
      - "8082:80"
      - "8443:443"
      - "8443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../packages/web:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    restart: unless-stopped
    networks: [korin]
    depends_on:
      api:
        condition: service_started
      # Not required: with the `wiki` profile off, caddy still starts and the
      # /wiki/* route simply 502s (the wiki lives on Pages). With `--profile
      # wiki`, caddy waits for the local wiki container.
      wiki:
        condition: service_started
        required: false

volumes:
  caddy_data:
  caddy_config:

networks:
  korin:
    driver: bridge
