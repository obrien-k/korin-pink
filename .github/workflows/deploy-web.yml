name: deploy-web

# Publishes the static korin.pink portal (packages/web) to Cloudflare Pages.
#
# This workflow stays DORMANT until you opt in by setting the repository
# variable DEPLOY_WEB=true (Settings → Secrets and variables → Actions →
# Variables). That way it never fails red before Cloudflare is connected.
#
# Required secrets once enabled:
#   CLOUDFLARE_API_TOKEN   - token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  - your Cloudflare account id
#
# The Pages project name defaults to "korin-pink"; override with the
# CF_PAGES_PROJECT repository variable if you named it differently.
#
# Note: if you connect the repo via Cloudflare Pages' native Git integration
# instead (recommended for the simplest setup), you do NOT need this workflow —
# Cloudflare builds on push automatically. See docs/deploy/cloudflare-pages.md.

on:
  push:
    branches: [main]
    paths:
      # The Astro app now contains both the landing page and the wiki
      # (src/content/docs/wiki/**), so packages/web/** covers wiki changes too.
      - 'packages/web/**'
      - 'packages/chat/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ vars.DEPLOY_WEB == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      # Build the gamja web IRC client into packages/web/public/chat FIRST, so the
      # following `astro build` copies it into dist/chat alongside the wiki and
      # landing page (clones + Parcel-builds gamja; see packages/chat/build.sh).
      - name: Build gamja web client (/chat)
        run: packages/chat/build.sh

      # Build the unified Astro site: landing at /, Starlight wiki at /wiki/*,
      # gamja at /chat/ — one dist/.
      - name: Build portal + wiki (Astro)
        run: pnpm --filter @korin/web build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy packages/web/dist
            --project-name=${{ vars.CF_PAGES_PROJECT || 'korin-pink' }}
            --branch=main
