<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>korin.pink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="alternate" type="application/rss+xml" title="Welcome to the Internet Podcast Feed" href="/irc/feed.xml" />
</head>
<body>
  <main>
    <header>
      <span class="wordmark">korin.pink</span><span class="cursor" aria-hidden="true">█</span>
      <p class="tagline">stellar community infrastructure</p>
    </header>

    <nav class="services" aria-label="services">

      <a class="service" href="irc://irc.korin.pink:6697" aria-label="IRC — connect with any client">
        <span class="service__key">irc</span>
        <span class="service__desc">
          <span class="service__title">internet relay chat</span>
          <span class="service__meta">irc.korin.pink:6697 · TLS · IRCv3</span>
        </span>
        <span class="service__arrow" aria-hidden="true">→</span>
      </a>

      <a class="service" href="/chat/" aria-label="chat — IRC in your browser">
        <span class="service__key">chat</span>
        <span class="service__desc">
          <span class="service__title">web irc client</span>
          <span class="service__meta">gamja · browser · no setup</span>
        </span>
        <span class="service__arrow" aria-hidden="true">→</span>
      </a>

      <a class="service" href="/wiki/" aria-label="wiki — resource center">
        <span class="service__key">wiki</span>
        <span class="service__desc">
          <span class="service__title">resource center</span>
          <span class="service__meta">tech · trans · coding · ripping</span>
        </span>
        <span class="service__arrow" aria-hidden="true">→</span>
      </a>

      <!-- files: backend (/files) not deployed yet — re-enable when it lands
      <a class="service" href="/files" aria-label="files — upload, download, zip">
        <span class="service__key">files</span>
        <span class="service__desc">
          <span class="service__title">file transfer</span>
          <span class="service__meta">upload · download · zip · unzip</span>
        </span>
        <span class="service__arrow" aria-hidden="true">→</span>
      </a>
      -->

    </nav>

    <footer>
      <span class="footer__network">stellar network</span>
      <span class="footer__sep" aria-hidden="true">·</span>
      <!-- CRS flips to active once stellar-api v1+ consumes IRCScore in production
           (CONTEXT.md v1.0.0 milestone). The version tracks the CRS PRD
           (stellar-api docs/prd/01), not this repo's release tag. -->
      <a class="footer__crs" href="https://stellar.example.com/reputation" target="_blank" rel="noopener">
        CRS pending
      </a>
      <span class="footer__sep" aria-hidden="true">·</span>
      <span class="footer__version">v0.0.4</span>
    </footer>
  </main>

  <script src="main.js" type="module"></script>
</body>
</html>
