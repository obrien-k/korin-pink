name: deploy-web

# Publishes the static korin.pink portal (packages/web) to Cloudflare Pages.
#
# This workflow stays DORMANT until you opt in by setting the repository
# variable DEPLOY_WEB=true (Settings → Secrets and variables → Actions →
# Variables). That way it never fails red before Cloudflare is connected.
#
# Required secrets once enabled:
#   CLOUDFLARE_API_TOKEN   - token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  - your Cloudflare account id
#
# The Pages project name defaults to "korin-pink"; override with the
# CF_PAGES_PROJECT repository variable if you named it differently.
#
# Note: if you connect the repo via Cloudflare Pages' native Git integration
# instead (recommended for the simplest setup), you do NOT need this workflow —
# Cloudflare builds on push automatically. See docs/deploy/cloudflare-pages.md.

on:
  push:
    branches: [main]
    paths:
      - 'packages/web/**'
      - 'packages/chat/**'
      # The wiki is built into packages/web/wiki at deploy time, so its source
      # must also trigger a deploy — otherwise wiki-only changes never ship.
      - 'wiki/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ vars.DEPLOY_WEB == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build the Docusaurus wiki into the portal so /wiki/ is served from the
      # same origin (mirrors the Caddy front-door routing in the self-hosted stack).
      - name: Build wiki into portal (/wiki)
        run: |
          cd wiki
          npm ci
          npm run build
          rm -rf ../packages/web/wiki
          cp -r build ../packages/web/wiki

      # Build the gamja web IRC client into the portal so /chat/ ships in the same
      # bundle (clones + Parcel-builds gamja; see packages/chat/build.sh).
      - name: Build gamja web client into portal (/chat)
        run: |
          cd packages/chat
          ./build.sh

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy packages/web
            --project-name=${{ vars.CF_PAGES_PROJECT || 'korin-pink' }}
            --branch=main
