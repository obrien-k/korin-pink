name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        type: choice
        options: [gcp, aws, vps]

jobs:

  # ── Build images (platform-agnostic) ───────────────────────────────────────
  # Set DEPLOY_TARGET repo variable to: gcp | aws | vps
  # Images go to: GCP Artifact Registry | AWS ECR | GHCR

  build:
    name: build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write   # for GHCR

    outputs:
      registry: ${{ steps.registry.outputs.reg }}

    steps:
      - uses: actions/checkout@v4

      - name: resolve target
        id: target
        run: echo "val=${{ vars.DEPLOY_TARGET || github.event.inputs.target }}" >> $GITHUB_OUTPUT

      # GCP
      - if: steps.target.outputs.val == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - if: steps.target.outputs.val == 'gcp'
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      # AWS
      - if: steps.target.outputs.val == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT }}:role/github-actions-korin
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - if: steps.target.outputs.val == 'aws'
        run: |
          aws ecr get-login-password --region ${{ vars.AWS_REGION || 'us-east-1' }} \
            | docker login --username AWS \
              --password-stdin ${{ secrets.AWS_ACCOUNT }}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-1' }}.amazonaws.com

      # VPS → GHCR
      - if: steps.target.outputs.val == 'vps'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: set registry
        id: registry
        run: |
          TARGET=${{ steps.target.outputs.val }}
          case "$TARGET" in
            gcp) REG="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/korin" ;;
            aws) REG="${{ secrets.AWS_ACCOUNT }}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-1' }}.amazonaws.com/korin" ;;
            vps) REG="ghcr.io/${{ github.repository_owner }}/korin" ;;
          esac
          echo "reg=$REG" >> $GITHUB_OUTPUT

      - name: build + push api
        run: |
          R=${{ steps.registry.outputs.reg }}
          docker build -t $R/api:${{ github.sha }} -t $R/api:latest ./packages/api
          docker push $R/api --all-tags

      - name: build + push irc-bridge
        run: |
          R=${{ steps.registry.outputs.reg }}
          docker build -t $R/irc-bridge:${{ github.sha }} -t $R/irc-bridge:latest ./packages/irc-bridge
          docker push $R/irc-bridge --all-tags

      - name: build + push ergo
        run: |
          R=${{ steps.registry.outputs.reg }}
          docker build -t $R/ergo:${{ github.sha }} -t $R/ergo:latest ./packages/irc
          docker push $R/ergo --all-tags

  # ── Deploy: GCP ────────────────────────────────────────────────────────────
  deploy-gcp:
    needs: build
    if: vars.DEPLOY_TARGET == 'gcp' || github.event.inputs.target == 'gcp'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: korin-api
          region: us-central1
          image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/korin/api:${{ github.sha }}
      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: korin-irc-bridge
          region: us-central1
          image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/korin/irc-bridge:${{ github.sha }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gsutil -m rsync -r -d ./packages/web gs://korin-pink-web

  # ── Deploy: AWS ────────────────────────────────────────────────────────────
  deploy-aws:
    needs: build
    if: vars.DEPLOY_TARGET == 'aws' || github.event.inputs.target == 'aws'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT }}:role/github-actions-korin
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - run: aws ecs update-service --cluster korin --service korin-api --force-new-deployment
      - run: aws ecs update-service --cluster korin --service korin-irc-bridge --force-new-deployment
      - run: aws s3 sync ./packages/web s3://korin-pink-web --delete

  # ── Deploy: VPS ────────────────────────────────────────────────────────────
  deploy-vps:
    needs: build
    if: vars.DEPLOY_TARGET == 'vps' || github.event.inputs.target == 'vps'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/ssh-action@v1
        env:
          # Shared secrets — each minted by the side that GUARDS the call (the
          # other repo holds a copy as an Actions secret). See docs/deploy/secrets.md.
          STELLAR_PULL_KEY:    ${{ secrets.STELLAR_PULL_KEY }}     # S1: korin guards  -> korin mints
          STELLAR_SERVICE_KEY: ${{ secrets.STELLAR_SERVICE_KEY }}  # S2: stellar guards -> stellar mints
          # korin-internal secrets.
          IRC_BRIDGE_SECRET:   ${{ secrets.IRC_BRIDGE_SECRET }}
          IRC_SASL_USER:       ${{ secrets.IRC_SASL_USER }}
          IRC_SASL_PASS:       ${{ secrets.IRC_SASL_PASS }}
          # Non-secret config (repo variables, with defaults).
          STELLAR_API_URL:     ${{ vars.STELLAR_API_URL }}
          API_DOMAIN:          ${{ vars.API_DOMAIN || 'api.korin.pink' }}
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          # Forward the env above into the remote shell (kept out of the logged script).
          envs: STELLAR_PULL_KEY,STELLAR_SERVICE_KEY,IRC_BRIDGE_SECRET,IRC_SASL_USER,IRC_SASL_PASS,STELLAR_API_URL,API_DOMAIN
          script: |
            set -euo pipefail
            cd /opt/korin.pink
            git pull origin main
            # Render the box .env from the injected secrets — deploy-managed, never
            # hand-edited. Note STELLAR_API_KEY (korin's outbound Bearer) is fed by
            # stellar's STELLAR_SERVICE_KEY: same secret, named per side.
            umask 077
            cat > /opt/korin.pink/.env <<EOF
            DOMAIN=korin.pink
            STELLAR_API_URL=${STELLAR_API_URL}
            STELLAR_PULL_KEY=${STELLAR_PULL_KEY}
            STELLAR_API_KEY=${STELLAR_SERVICE_KEY}
            IRC_BRIDGE_SECRET=${IRC_BRIDGE_SECRET}
            IRC_HOST=ergo
            IRC_PORT=6697
            IRC_TLS=true
            IRC_NICK=stellar-bridge
            IRC_SASL_USER=${IRC_SASL_USER}
            IRC_SASL_PASS=${IRC_SASL_PASS}
            KORIN_API_URL=http://api:3000
            FLUSH_INTERVAL_MS=60000
            EOF
            # Bring up the public API behind Caddy (prod overlay). Ergo is managed
            # separately; the bridge lands with #20 once its Ergo account exists.
            cd infra
            API_DOMAIN="${API_DOMAIN}" docker compose \
              -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --build api caddy
